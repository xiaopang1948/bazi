<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>八字排盘</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☯</text></svg>">
  <link rel="stylesheet" href="css/bazi.css">
</head>
<body>
  <div id="app">
    <!-- 顶部导航 -->
    <header class="app-header">
      <h1>八字排盘</h1>
      <nav class="app-tabs">
        <button class="tab active" data-tab="bazi">排盘</button>
        <button class="tab" data-tab="hepan">合盘</button>
        <button class="tab" data-tab="zeri">择日</button>
        <button class="tab" data-tab="celebrities">名人</button>
        <button class="tab" data-tab="wuyun">五运六气</button>
        <button class="tab" data-tab="history">历史</button>
        <button class="tab" data-tab="settings">设置</button>
      </nav>
    </header>

    <main class="app-main">
      <!-- ========== 排盘 TAB ========== -->
      <section class="tab-content active" id="tab-bazi">
        <!-- 输入区 -->
        <div class="input-card">
          <div class="input-row">
            <div class="input-group">
              <label>姓名</label>
              <input type="text" id="name" placeholder="选填" maxlength="10">
            </div>
            <div class="input-group">
              <label>性别</label>
              <div class="radio-group">
                <label><input type="radio" name="gender" value="male" checked> 男</label>
                <label><input type="radio" name="gender" value="female"> 女</label>
              </div>
            </div>
          </div>
          <div class="input-row">
            <div class="input-group">
              <label>出生日期</label>
              <div class="date-group">
                <select id="year"></select><span>年</span>
                <select id="month"></select><span>月</span>
                <select id="day"></select><span>日</span>
              </div>
            </div>
          </div>
          <div class="input-row">
            <div class="input-group">
              <label>出生时间</label>
              <div class="date-group">
                <select id="hour"></select><span>时</span>
                <select id="minute"></select><span>分</span>
              </div>
            </div>
            <div class="input-group">
              <label>出生城市</label>
              <select id="city">
                <option value="beijing">北京</option>
              </select>
            </div>
          </div>
          <div class="input-row actions">
            <button class="btn-primary" id="btnCalc">开始排盘</button>
            <label class="checkbox-label">
              <input type="checkbox" id="useSolarTime" checked> 真太阳时校正
            </label>
          </div>
        </div>

        <!-- 结果区 -->
        <div id="result" class="result-area" style="display:none">

          <!-- 基础信息 -->
          <div class="info-bar" id="infoBar"></div>

          <!-- 四柱图示 -->
          <div class="card" id="diagramCard" style="display:none">
            <h3>四柱图示 · 干支流通</h3>
            <div style="overflow-x:auto"><canvas id="pillarDiagram" style="display:block;width:100%"></canvas></div>
          </div>

          <!-- 运势报告 -->
          <div class="card" id="reportCard" style="display:none">
            <h3>运势报告</h3>
            <div id="reportContent" class="report-text"></div>
            <button class="btn-primary copy-report-btn" style="margin-top:10px;font-size:13px;padding:6px 16px" onclick="copyReport()">📋 复制报告</button>
          </div>

          <!-- 辅助信息区（折叠式） -->
          <div class="compact-grid" id="compactInfo" style="display:none">

          <!-- 四柱排盘表 -->
          <div class="pillars-card">
            <div class="pillars-grid" id="pillarsGrid">
              <div class="pillar-cell header-cell">年柱</div>
              <div class="pillar-cell header-cell">月柱</div>
              <div class="pillar-cell header-cell">日柱</div>
              <div class="pillar-cell header-cell">时柱</div>
              <!-- JS 动态填充 -->
            </div>
          </div>

          <!-- 详细分析 -->
          <div class="analysis-grid">
            <!-- 五行统计 -->
            <div class="card" id="wuxingCard">
              <h3>五行统计</h3>
              <div class="wuxing-bars" id="wuxingBars"></div>
            </div>
            <!-- 神煞 -->
            <div class="card" id="starsCard">
              <h3>神煞</h3>
              <div id="starsList" class="stars-list"></div>
            </div>
          </div>

          <!-- 格局分析 -->
          <div class="card" id="patternCard">
            <h3>格局分析</h3>
            <div id="patternContent"></div>
          </div>

          <!-- 特殊格局 -->
          <div class="card" id="specialPatternCard" style="display:none">
            <h3>特殊格局</h3>
            <div id="specialPatternContent"></div>
          </div>

          <!-- 六亲排盘 -->
          <div class="compact-item" id="liuQinCard" style="display:none">
            <div class="compact-label">六亲</div>
            <div id="liuQinContent"></div>
          </div>

          <!-- 胎元命宫身宫 -->
          <div class="compact-item" id="extraPillarsCard" style="display:none">
            <div class="compact-label">胎元 · 命宫 · 身宫</div>
            <div id="extraPillarsContent"></div>
          </div>

          <!-- 人元司令 -->
          <div class="compact-item" id="renYuanCard" style="display:none">
            <div class="compact-label">人元司令</div>
            <div id="renYuanContent"></div>
          </div>

          <!-- 古籍匹配 -->
          <div class="compact-item" id="guJiCard" style="display:none">
            <div class="compact-label">古籍引证</div>
            <div id="guJiContent"></div>
          </div>

          <!-- 起名推荐 -->
          <div class="compact-item" id="qiMingCard" style="display:none">
            <div class="compact-label">起名推荐</div>
            <div id="qiMingContent"></div>
          </div>
          </div>

          <!-- 大运 -->
          <div class="card" id="dayunCard">
            <h3>大运</h3>
            <div class="dayun-timeline" id="dayunList"></div>
          </div>

          <!-- 当前流年 -->
          <div class="card" id="currentYearCard">
            <h3>当前流年</h3>
            <div id="currentYearContent"></div>
          </div>

          <!-- 流月 -->
          <div class="card-secondary" id="liuYueCard" style="display:none">
            <h3>流月</h3>
            <div id="liuYueContent"></div>
          </div>

          <!-- 流日 -->
          <div class="card-secondary" id="liuRiCard" style="display:none">
            <h3>本月流日</h3>
            <div id="liuRiContent"></div>
          </div>
        </div>
      </section>

      <!-- ========== 合盘 TAB ========== -->
      <section class="tab-content" id="tab-hepan">
        <div class="input-card">
          <h3 style="margin-bottom:12px;color:var(--primary)">婚姻合盘</h3>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
            <!-- 甲方 -->
            <div style="border:1px solid var(--border);border-radius:8px;padding:12px">
              <h4 style="margin-bottom:8px;color:var(--text)">甲方</h4>
              <div class="input-group">
                <label>姓名</label>
                <input type="text" id="hp1Name" placeholder="选填" maxlength="10">
              </div>
              <div class="input-group">
                <label>性别</label>
                <div class="radio-group">
                  <label><input type="radio" name="hp1Gender" value="male" checked> 男</label>
                  <label><input type="radio" name="hp1Gender" value="female"> 女</label>
                </div>
              </div>
              <div class="input-group">
                <label>出生日期</label>
                <div class="date-group">
                  <select id="hp1Year"></select><span>年</span>
                  <select id="hp1Month"></select><span>月</span>
                  <select id="hp1Day"></select><span>日</span>
                </div>
              </div>
              <div class="input-group">
                <label>出生时间</label>
                <div class="date-group">
                  <select id="hp1Hour"></select><span>时</span>
                  <select id="hp1Minute"></select><span>分</span>
                </div>
              </div>
              <div class="input-group">
                <label>城市</label>
                <select id="hp1City"></select>
              </div>
            </div>
            <!-- 乙方 -->
            <div style="border:1px solid var(--border);border-radius:8px;padding:12px">
              <h4 style="margin-bottom:8px;color:var(--text)">乙方</h4>
              <div class="input-group">
                <label>姓名</label>
                <input type="text" id="hp2Name" placeholder="选填" maxlength="10">
              </div>
              <div class="input-group">
                <label>性别</label>
                <div class="radio-group">
                  <label><input type="radio" name="hp2Gender" value="male"> 男</label>
                  <label><input type="radio" name="hp2Gender" value="female" checked> 女</label>
                </div>
              </div>
              <div class="input-group">
                <label>出生日期</label>
                <div class="date-group">
                  <select id="hp2Year"></select><span>年</span>
                  <select id="hp2Month"></select><span>月</span>
                  <select id="hp2Day"></select><span>日</span>
                </div>
              </div>
              <div class="input-group">
                <label>出生时间</label>
                <div class="date-group">
                  <select id="hp2Hour"></select><span>时</span>
                  <select id="hp2Minute"></select><span>分</span>
                </div>
              </div>
              <div class="input-group">
                <label>城市</label>
                <select id="hp2City"></select>
              </div>
            </div>
          </div>
          <div class="input-row actions" style="margin-top:12px">
            <button class="btn-primary" id="btnHarmony">开始合盘</button>
            <label class="checkbox-label">
              <input type="checkbox" id="hpUseSolar" checked> 真太阳时校正
            </label>
          </div>
        </div>

        <!-- 合盘结果 -->
        <div id="harmonyResult" style="display:none">
          <div class="card" id="harmonyScoreCard">
            <h3>合盘评分</h3>
            <div id="harmonyScoreDisplay" style="text-align:center;padding:10px"></div>
          </div>
          <div class="card" id="harmonyDetailsCard">
            <h3>详细分析</h3>
            <div id="harmonyDetails"></div>
          </div>
        </div>
      </section>

      <!-- ========== 择日 TAB ========== -->
      <section class="tab-content" id="tab-zeri">
        <div class="input-card">
          <div class="input-row">
            <div class="input-group">
              <label>选择日期</label>
              <div class="date-group">
                <select id="zeriYear"></select><span>年</span>
                <select id="zeriMonth"></select><span>月</span>
                <select id="zeriDay"></select><span>日</span>
              </div>
            </div>
            <div class="input-group">
              <label>&nbsp;</label>
              <button class="btn-primary" id="btnZeri">查黄历</button>
            </div>
          </div>
        </div>
        <div id="zeriResult" style="display:none">
          <div class="card">
            <h3>黄历</h3>
            <div id="zeriContent" style="font-size:14px;line-height:1.8"></div>
          </div>
          <div class="card">
            <h3>本月概况</h3>
            <div id="zeriMonthView" style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;font-size:12px"></div>
          </div>
        </div>
      </section>

      <!-- ========== 名人库 TAB ========== -->
      <section class="tab-content" id="tab-celebrities">
        <div class="input-card">
          <div class="input-row">
            <div class="input-group">
              <label>搜索名人</label>
              <input type="text" id="celebritySearch" placeholder="输入姓名..." oninput="filterCelebrities()">
            </div>
            <div class="input-group">
              <label>分类</label>
              <select id="celebrityTag" onchange="filterCelebrities()">
                <option value="">全部</option>
                <option value="帝王">帝王</option>
                <option value="政治家">政治家</option>
                <option value="企业家">企业家</option>
                <option value="科学家">科学家</option>
                <option value="演员">演员</option>
                <option value="歌手">歌手</option>
                <option value="导演">导演</option>
                <option value="作家">作家</option>
                <option value="运动员">运动员</option>
              </select>
            </div>
          </div>
        </div>
        <div id="celebrityList"></div>
      </section>

      <!-- ========== 五运六气 TAB ========== -->
      <section class="tab-content" id="tab-wuyun">
        <div class="input-card">
          <div class="input-row">
            <div class="input-group">
              <label>选择年份</label>
              <select id="wuyunYear"></select>
            </div>
            <div class="input-group">
              <label>&nbsp;</label>
              <button class="btn-primary" id="btnWuYun">查看五运六气</button>
            </div>
          </div>
        </div>
        <div id="wuyunResult" style="display:none">
          <div class="card"><h3>岁运 · 司天 · 在泉</h3><div id="wuyunOverview"></div></div>
          <div class="card"><h3>客运</h3><div id="wuyunKeYun"></div></div>
          <div class="card"><h3>客气</h3><div id="wuyunKeQi"></div></div>
          <div class="card"><h3>客主加临</h3><div id="wuyunJiaLin"></div></div>
        </div>
      </section>

      <!-- ========== 历史记录 TAB ========== -->
      <section class="tab-content" id="tab-history">
        <div class="placeholder">
          <h2>排盘历史</h2>
          <p id="historyEmpty">暂无记录</p>
          <div id="historyList"></div>
        </div>
      </section>

      <!-- ========== 设置 TAB ========== -->
      <section class="tab-content" id="tab-settings">
        <div class="placeholder">
          <h2>设置</h2>
          <label class="checkbox-label">
            <input type="checkbox" id="darkMode"> 暗黑模式
          </label>
        </div>
      </section>
    </main>

    <!-- 底部 -->
    <footer class="app-footer">
      <span>基于 lunar-javascript 引擎 | 数据仅供娱乐参考</span>
    </footer>
  </div>

  <div style="position:fixed;bottom:20px;right:20px;z-index:1000">
    <button class="btn-primary" id="btnExport" style="opacity:0.8;font-size:13px;padding:6px 16px" onclick="window.print()">📄 导出PDF</button>
  </div>

  <!-- lunar 库（CDN） -->
  <script src="https://cdn.jsdelivr.net/npm/lunar-javascript@1.7.7/lunar.min.js"></script>
  <script src="js/data/cities.js"></script>
  <script src="js/data/stars-rules.js"></script>
  <script src="js/data/shi-er-chang-sheng.js"></script>
  <script src="js/data/ren-yuan-si-ling.js"></script>
  <script src="js/data/gu-ji-pi-pei.js"></script>
  <script src="js/data/celebrities.js"></script>
  <script src="js/data/qi-ming-zi-ku.js"></script>
  <script src="js/core/wuyun-liuqi.js"></script>
  <script src="js/core/bazi-engine.js"></script>
  <script src="js/core/extra-pillars.js"></script>
  <script src="js/core/harmony.js"></script>
  <script src="js/ui/pillar-diagram.js"></script>
  <script src="js/ui/report.js"></script>
  <script src="js/ui/app.js"></script>
</body>
</html>
