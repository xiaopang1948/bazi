  <!-- Menu dropdown toggle -->
  <script>
  const menuBtn = document.getElementById('menuBtn');
  const menuOverlay = document.getElementById('menuOverlay');

  function toggleMenu() {
    menuOverlay.classList.toggle('open');
  }
  function closeMenu() { menuOverlay.classList.remove('open'); }

  menuBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    toggleMenu();
  });

  menuOverlay.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', function(e) {
      e.preventDefault();
      const tab = this.dataset.tab;
      if (tab) {
        closeMenu();
        setTimeout(() => BaziRouter.go(tab), 100);
      }
    });
  });

  document.addEventListener('click', function(e) {
    if (!menuOverlay.contains(e.target) && e.target !== menuBtn) closeMenu();
  });
  </script>

        else                   { sizeLv = 1.3;  spdMul = 1.4;  alphaMul = 1.0; }
        drops[i] = {
          x: i * w + w * 0.3,
          y: Math.random() * c.height,
          spd: (0.07 + Math.random() * 0.15) * spdMul,
          word: terms[Math.floor(Math.random() * terms.length)],
          sizeLv, alphaMul,
        };
      }
    }

    function draw() {
      ctx.clearRect(0, 0, c.width, c.height);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      for (let i = 0; i < drops.length; i++) {
        const d = drops[i];
        const fsize = Math.round(fs * d.sizeLv);
        const a = (0.35 + Math.random() * 0.35) * d.alphaMul;
        if (a <= 0.02) continue;
        ctx.font = `bold ${fsize}px "PingFang SC", "Microsoft YaHei", sans-serif`;
        ctx.globalAlpha = a;
        ctx.fillStyle = i % 3 === 0 ? '#ffffff' : '#00E676';
        for (let k = 0; k < d.word.length; k++)
          ctx.fillText(d.word[k], d.x, d.y + k * fsize * 1.0);
        ctx.globalAlpha = 1;
        d.y += d.spd;
        if (d.y > c.height + d.word.length * fs * d.sizeLv) {
          d.y = -fs * d.sizeLv * 3;
          d.word = terms[Math.floor(Math.random() * terms.length)];
          d.spd = (0.07 + Math.random() * 0.15) * (d.sizeLv > 1 ? d.sizeLv * 1.1 : d.sizeLv * 0.7);
        }
      }
      requestAnimationFrame(draw);
    }

    resize();
    window.addEventListener('resize', resize);
    draw();
  })();
  </script>
</body>
</html>
