<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="专业八字排盘工具 - 支持四柱十神、大运流年、合盘择日、五运六气、名人库等功能，纯前端离线可用">
  <meta name="theme-color" content="#b8860b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>八字排盘 - 专业免费在线工具</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☯</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/bazi.css">
</head>
<body>
  <div id="loadingOverlay" style="position:fixed;inset:0;background:#f5f0eb;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:12px;transition:opacity 0.3s">
    <div style="font-size:28px;color:#b8860b;font-weight:800">八字排盘</div>
    <div style="font-size:13px;color:#8a8580">加载中...</div>
  </div>
  <div id="app">
    <!-- 侧边栏导航 -->
    <aside class="sidebar">
      <div class="sidebar-logo">☯</div>
      <nav class="sidebar-nav">
        <button class="tab active" data-tab="bazi">排盘</button>
        <button class="tab" data-tab="yunshi">运势分析</button>
        <button class="tab" data-tab="zeri">择日</button>
        <button class="tab" data-tab="hepan">合盘</button>
        <button class="tab" data-tab="celebrities">名人</button>
        <button class="tab" data-tab="history">历史</button>
        <button class="tab" data-tab="settings">设置</button>
      </nav>
      <div class="sidebar-footer">
        <span>基于 lunar-javascript 引擎</span>
        <span>数据仅供娱乐参考</span>
      </div>
    </aside>

    <main class="app-main">
      <!-- ========== 排盘 TAB ========== -->
      <section class="tab-content active" id="tab-bazi">
        <!-- 输入视图 -->
        <div id="inputView">
          <!-- 首页英雄区 -->
          <div class="home-hero">
            <div class="home-hero-bg"></div>
            <div class="home-hero-icon">☯</div>
            <h2 class="home-hero-title">八字排盘</h2>
            <p class="home-hero-subtitle">知命而行，顺势而为</p>
          </div>
          <!-- 输入区 -->
          <div class="input-card">
            <div class="input-row-5">
              <span class="input-label">姓名</span>
              <div class="input-right">
                <input type="text" id="name" placeholder="请输入姓名" maxlength="10" class="name-input">
              </div>
            </div>
            <div class="input-row-5">
              <div class="input-left">
                <div class="pill-group" id="genderGroup">
                  <button class="pill active" data-value="male">男</button>
                  <button class="pill" data-value="female">女</button>
                </div>
              </div>
              <div class="input-right">
                <div class="pill-group" id="calendarGroup">
                  <button class="pill active" data-value="solar">公历</button>
                  <button class="pill" data-value="lunar">农历</button>
                </div>
              </div>
            </div>
            <div class="input-row-5">
              <span class="input-label">出生时间</span>
              <div class="input-right">
                <div class="date-group">
                  <select id="year"></select><span>年</span>
                  <select id="month"></select><span>月</span>
                  <select id="day"></select><span>日</span>
                  <select id="hour"></select><span>时</span>
                  <select id="minute"></select><span>分</span>
                  <label class="solar-toggle">
                    <input type="checkbox" id="useSolarTime" checked> 真太阳时
                  </label>
                </div>
              </div>
            </div>
            <div class="input-row-5">
              <span class="input-label">出生地区</span>
              <div class="input-right">
                <select id="province"></select>
                <select id="city"></select>
              </div>
            </div>
            <div class="input-row-5 btn-row">
              <button class="btn-primary" id="btnCalc">开始排盘</button>
            </div>
          </div>
        </div>

        <!-- 结果区 -->
        <div id="result" class="result-area" style="display:none">

          <!-- 结果顶部导航 -->
          <div class="result-topbar">
            <button class="btn-back" id="btnBack">← 重新排盘</button>
          </div>

          <!-- 一级：基础信息 + 四柱 -->
          <div class="info-bar" id="infoBar"></div>

          <div class="pillars-card">
            <div class="mg-grid" id="pillarsGrid"></div>
          </div>

          <!-- 起运/交运 -->
          <div class="card" id="qiyunCard" style="display:none">
            <div class="qiyun-body">
              <div class="qiyun-left">
                <div class="qiyun-row">
                  <span class="qiyun-label">起运</span>
                  <span class="qiyun-value" id="qiyunStart"></span>
                </div>
                <div class="qiyun-row">
                  <span class="qiyun-label">交运</span>
                  <span class="qiyun-value" id="qiyunJiao"></span>
                </div>
              </div>
              <div class="qiyun-right">
                <div class="qiyun-age" id="qiyunAge"></div>
                <button class="qiyun-today" id="btnToday">今</button>
              </div>
            </div>
          </div>

          <!-- 大运/流年/流月/流日/流时 -->
          <div class="card time-panel-card" id="timePanelCard" style="display:none">
            <div class="time-panel" id="timePanel">
              <div class="tp-row" data-level="dayun">
                <div class="tp-label" data-label="大运">大<br>运</div>
                <div class="tp-content" id="tpDayun"></div>
              </div>
              <div class="tp-row" data-level="liunian">
                <div class="tp-label" data-label="流年">流<br>年</div>
                <div class="tp-content" id="tpLiunian"></div>
              </div>
              <div class="tp-row" data-level="liuyue">
                <div class="tp-label" data-label="流月">流<br>月</div>
                <div class="tp-content" id="tpLiuyue"></div>
              </div>
              <div class="tp-row" data-level="liuri">
                <div class="tp-label" data-label="流日">流<br>日</div>
                <div class="tp-content" id="tpLiuri"></div>
              </div>
              <div class="tp-row" data-level="liushi">
                <div class="tp-label" data-label="流时">流<br>时</div>
                <div class="tp-content" id="tpLiushi"></div>
              </div>
            </div>
          </div>

          <!-- 并行：五行统计 | 格局分析 · 古籍引证 | 袁天罡称骨 -->
          <div class="analysis-grid">
            <div class="card" id="wuxingCard">
              <h3>五行统计</h3>
              <div class="wuxing-bars" id="wuxingBars"></div>
              <div id="wuxingDesc" class="wuxing-desc"></div>
            </div>
            <div class="card" id="patternCard">
              <h3>格局分析 · 古籍引证</h3>
              <div id="patternContent"></div>
              <div id="specialPatternContent" style="display:none"></div>
              <div class="geju-gu-ji-divider" id="guJiDivider" style="display:none"></div>
              <div id="guJiCompact"></div>
            </div>
            <div class="card" id="guKuCard" style="display:none">
              <h3>袁天罡称骨</h3>
              <div id="guKuContent"></div>
            </div>
          </div>

          <!-- 四柱图示 · 干支流通 -->
          <div class="card" id="diagramCard" style="display:none">
            <h3>四柱图示 · 干支流通</h3>
            <div style="overflow-x:auto"><canvas id="pillarDiagram" style="display:block;width:100%"></canvas></div>
          </div>

        </div>
      </section>

      <!-- ========== 运势分析 TAB ========== -->
      <section class="tab-content" id="tab-yunshi">
        <div class="yunshi-toolbar">
          <div class="ys-btn-group">
            <span>视角</span>
            <button class="ys-btn active" data-view="life">终身</button>
            <button class="ys-btn" data-view="year">年</button>
            <button class="ys-btn" data-view="month">月</button>
            <button class="ys-btn" data-view="week">周</button>
            <button class="ys-btn" data-view="day">日</button>
          </div>
          <div class="ys-btn-group">
            <span>维度</span>
            <button class="ys-btn active" data-dim="overall">综合</button>
            <button class="ys-btn" data-dim="love">感情</button>
            <button class="ys-btn" data-dim="health">健康</button>
            <button class="ys-btn" data-dim="career">事业</button>
            <button class="ys-btn" data-dim="wealth">财运</button>
          </div>
        </div>

        <div class="card">
          <h3>运势K线图</h3>
          <div id="yunshiKLineContent" style="overflow-x:auto"></div>
        </div>

        <div class="card" id="yunshiReportCard" style="display:none">
          <h3>运势报告</h3>
          <div id="yunshiReportContent"></div>
        </div>

        <div class="card" id="yunshiAdviceCard" style="display:none">
          <h3>每日宜忌</h3>
          <div id="yunshiAdviceContent"></div>
        </div>
      </section>

      <!-- ========== 合盘 TAB ========== -->
      <section class="tab-content" id="tab-zeri">
        <div class="input-card">
          <div class="input-row">
            <div class="input-group">
              <label>选择日期</label>
              <div class="date-group">
                <select id="zeriYear"></select><span>年</span>
                <select id="zeriMonth"></select><span>月</span>
                <select id="zeriDay"></select><span>日</span>
              </div>
            </div>
            <div class="input-group">
              <label>&nbsp;</label>
              <button class="btn-primary" id="btnZeri">查黄历</button>
            </div>
          </div>
        </div>
        <div id="zeriResult" style="display:none">
          <div class="card">
            <h3>黄历</h3>
            <div id="zeriContent"></div>
          </div>
          <div class="card">
            <h3>本月概况</h3>
            <div id="zeriMonthView" style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;font-size:12px"></div>
          </div>
        </div>
      </section>

      <section class="tab-content" id="tab-hepan">
        <div class="input-card">
          <div class="input-row">
            <div class="input-group">
              <label>输入对方信息</label>
            </div>
          </div>
              <div class="input-group">
                <label>性别</label>
                <div class="radio-group">
                  <label><input type="radio" name="hp1Gender" value="male" checked> 男</label>
                  <label><input type="radio" name="hp1Gender" value="female"> 女</label>
                </div>
              </div>
              <div class="input-group">
                <label>出生日期</label>
                <div class="date-group">
                  <select id="hp1Year"></select><span>年</span>
                  <select id="hp1Month"></select><span>月</span>
                  <select id="hp1Day"></select><span>日</span>
                </div>
              </div>
              <div class="input-group">
                <label>出生时间</label>
                <div class="date-group">
                  <select id="hp1Hour"></select><span>时</span>
                  <select id="hp1Minute"></select><span>分</span>
                </div>
              </div>
              <div class="input-group">
                <label>城市</label>
                <select id="hp1City"></select>
              </div>
            </div>
            <!-- 乙方 -->
            <div style="border:1px solid var(--border);border-radius:8px;padding:12px">
              <h4 style="margin-bottom:8px;color:var(--text)">乙方</h4>
              <div class="input-group">
                <label>姓名</label>
                <input type="text" id="hp2Name" placeholder="选填" maxlength="10">
              </div>
              <div class="input-group">
                <label>性别</label>
                <div class="radio-group">
                  <label><input type="radio" name="hp2Gender" value="male"> 男</label>
                  <label><input type="radio" name="hp2Gender" value="female" checked> 女</label>
                </div>
              </div>
              <div class="input-group">
                <label>出生日期</label>
                <div class="date-group">
                  <select id="hp2Year"></select><span>年</span>
                  <select id="hp2Month"></select><span>月</span>
                  <select id="hp2Day"></select><span>日</span>
                </div>
              </div>
              <div class="input-group">
                <label>出生时间</label>
                <div class="date-group">
                  <select id="hp2Hour"></select><span>时</span>
                  <select id="hp2Minute"></select><span>分</span>
                </div>
              </div>
              <div class="input-group">
                <label>城市</label>
                <select id="hp2City"></select>
              </div>
            </div>
          <div class="input-row actions" style="margin-top:12px">
            <button class="btn-primary" id="btnHarmony">开始合盘</button>
            <label class="checkbox-label">
              <input type="checkbox" id="hpUseSolar" checked> 真太阳时校正
            </label>
          </div>

        <!-- 合盘结果 -->
        <div id="harmonyResult" style="display:none">
          <div class="card" id="harmonyScoreCard">
            <h3>合盘评分</h3>
            <div id="harmonyScoreDisplay" style="text-align:center;padding:10px"></div>
          </div>
          <div class="card" id="harmonyDetailsCard">
            <h3>详细分析</h3>
            <div id="harmonyDetails"></div>
          </div>
        </div>
      </section>

      <!-- ========== 名人库 TAB ========== -->
      <section class="tab-content" id="tab-celebrities">
        <div class="input-card">
          <div class="input-row">
            <div class="input-group">
              <label>搜索名人</label>
              <input type="text" id="celebritySearch" placeholder="输入姓名...">
            </div>
            <div class="input-group">
              <label>分类</label>
              <select id="celebrityTag">
                <option value="">全部</option>
                <option value="帝王">帝王</option>
                <option value="政治家">政治家</option>
                <option value="企业家">企业家</option>
                <option value="科学家">科学家</option>
                <option value="演员">演员</option>
                <option value="歌手">歌手</option>
                <option value="导演">导演</option>
                <option value="作家">作家</option>
                <option value="运动员">运动员</option>
              </select>
            </div>
          </div>
        </div>
        <div id="celebrityList"></div>
      </section>

      <!-- ========== 历史记录 TAB ========== -->
      <section class="tab-content" id="tab-history">
        <div class="placeholder">
          <h2>排盘历史</h2>
          <p id="historyEmpty">暂无记录</p>
          <div id="historyList"></div>
        </div>
      </section>

      <!-- ========== 设置 TAB ========== -->
      <section class="tab-content" id="tab-settings">
        <div class="placeholder">
          <h2>设置</h2>
          <label class="checkbox-label">
            <input type="checkbox" id="darkMode"> 暗黑模式
          </label>
        </div>
      </section>
    </main>
  </div>

  <div style="position:fixed;bottom:20px;right:20px;z-index:1000">
    <button class="btn-primary" id="btnExport" style="opacity:0.8;font-size:13px;padding:6px 16px">📄 导出PDF</button>
  </div>

  <!-- lunar 库（CDN） -->
  <script src="https://cdn.jsdelivr.net/npm/lunar-javascript@1.7.7/lunar.min.js"
    onerror="var s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/lunar-javascript/1.7.7/lunar.min.js';document.head.appendChild(s)"></script>
  <script src="js/data/cities.js"></script>
  <script src="js/data/stars-rules.js"></script>
  <script src="js/data/shi-er-chang-sheng.js"></script>
  <script src="js/data/ren-yuan-si-ling.js"></script>
  <script src="js/data/gu-ji-pi-pei.js"></script>
  <script src="js/data/celebrities.js"></script>
  <script src="js/core/guku.js"></script>
  <script src="js/core/bazi-engine.js"></script>
  <script src="js/core/extra-pillars.js"></script>
  <script src="js/core/harmony.js"></script>
  <script src="js/store.js"></script>
  <script src="js/router.js"></script>
  <script src="js/ui/pillar-diagram.js"></script>
  <script src="js/ui/components/pillars.js"></script>
  <script src="js/ui/components/patterns.js"></script>
  <script src="js/ui/components/timeline.js"></script>
  <script src="js/ui/components/hepan.js"></script>
  <script src="js/ui/components/zeri.js"></script>
  <script src="js/ui/components/celebrity.js"></script>
  <script src="js/ui/components/history.js"></script>
  <script src="js/ui/components/daily-score.js"></script>
  <script src="js/ui/components/yunshi.js"></script>
  <script src="js/ui/app.js"></script>
</body>
</html>
